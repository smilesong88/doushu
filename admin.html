<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理面板 - 紫微斗数</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <aside class="sidebar">
      <div class="sidebar-hd"><h2>🎨 管理面板</h2><p>紫微斗数内容管理</p></div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="nav-item active" data-sec="dashboard">📊 仪表盘</a>
        <a class="nav-item" data-sec="settings">⚙️ 基本设置</a>
        <a class="nav-item" data-sec="images">🖼️ 图片管理</a>
        <div class="nav-divider"></div>
        <div class="nav-label">六大基础盘</div>
        <div id="cat-nav"></div>
      </nav>
      <div class="sidebar-ft"><a href="/" target="_blank" class="preview-btn">👁️ 预览网站</a></div>
    </aside>

    <main class="main" id="main">
      <!-- 仪表盘 -->
      <section class="sec" id="sec-dashboard">
        <h2 class="sec-title">仪表盘</h2>
        <div class="stats" id="stats"></div>
        <div class="quick-box">
          <h3>快速操作</h3>
          <div class="quick-btns">
            <button class="btn" onclick="saveAll()">💾 保存所有更改</button>
            <button class="btn" onclick="exportData()">📤 导出备份</button>
            <label class="btn">📥 导入备份<input type="file" accept=".json" onchange="importData(event)" hidden></label>
          </div>
        </div>
      </section>

      <!-- 基本设置 -->
      <section class="sec" id="sec-settings" style="display:none">
        <h2 class="sec-title">基本设置</h2>
        <div class="form-card">
          <div class="fg"><label>网站标题</label><input id="s-title" class="fi"></div>
          <div class="fg"><label>副标题</label><input id="s-subtitle" class="fi"></div>
          <div class="fg"><label>网站描述</label><textarea id="s-desc" class="ft" rows="3"></textarea></div>
          <div class="form-divider"></div>
          <h3>联系方式</h3>
          <div class="fg"><label>邮箱</label><input id="s-email" class="fi" placeholder="example@email.com"></div>
          <div class="fg"><label>微信号</label><input id="s-wechat" class="fi" placeholder="your_wechat"></div>
          <div class="fg"><label>联系说明</label><textarea id="s-note" class="ft" rows="2"></textarea></div>
          <div class="form-divider"></div>
          <h3>显示设置</h3>
          <div class="fg-row">
            <div class="fg"><label>正文字号 (px)</label>
              <select id="s-fontsize" class="fi">
                <option value="14">14px - 小</option>
                <option value="15">15px - 适中</option>
                <option value="16" selected>16px - 标准</option>
                <option value="17">17px - 略大</option>
                <option value="18">18px - 大</option>
                <option value="20">20px - 特大</option>
                <option value="22">22px - 超大</option>
              </select></div>
            <div class="fg"><label>正文字体</label>
              <select id="s-fontfamily" class="fi">
                <option value="'Noto Serif SC','SimSun',serif">宋体（默认）</option>
                <option value="'Noto Sans SC','Microsoft YaHei',sans-serif">微软雅黑</option>
                <option value="'Ma Shan Zheng',cursive">马善政书法</option>
                <option value="'ZCOOL XiaoWei',serif">站酷小薇</option>
                <option value="'LXGW WenKai',serif">霞鹜文楷</option>
                <option value="'FangSong','STFangsong',serif">仿宋</option>
                <option value="'KaiTi','STKaiti',serif">楷体</option>
              </select></div>
          </div>
          <button class="btn-save" onclick="saveSettings()">保存设置</button>
        </div>
      </section>

      <!-- 图片管理 -->
      <section class="sec" id="sec-images" style="display:none">
        <h2 class="sec-title">图片管理</h2>
        <div class="upload-box">
          <input type="file" id="img-input" accept="image/*" multiple onchange="uploadImgs(event)" hidden>
          <label for="img-input"><div class="upload-icon">📁</div><p>点击上传图片</p><p class="upload-hint">JPG/PNG/GIF/WebP，最大10MB</p></label>
        </div>
        <div class="img-gallery" id="img-gallery"></div>
      </section>

      <!-- 分类编辑 -->
      <section class="sec" id="sec-category" style="display:none">
        <h2 class="sec-title" id="cat-edit-title">编辑分类</h2>
        <div class="form-card">
          <div class="fg-row">
            <div class="fg"><label>分类名称</label><input id="ce-name" class="fi"></div>
            <div class="fg"><label>宫位（如：寅申宫）</label><input id="ce-loc" class="fi"></div>
          </div>
          <div class="fg"><label>完整标题</label><input id="ce-full" class="fi"></div>
          <div class="fg"><label>分类描述</label><textarea id="ce-desc" class="ft" rows="3"></textarea></div>
          <div class="btn-row">
            <button class="btn-save" onclick="saveCatInfo()">保存分类信息</button>
            <button class="btn-del" onclick="deleteCat()">🗑️ 删除此分类</button>
          </div>
        </div>

        <div class="form-card">
          <h3>下属宫位</h3>
          <div id="palace-list-editor"></div>
          <div class="add-palace-box">
            <input id="new-palace-name" class="fi" placeholder="新宫位名称（如：寅宫）" style="width:200px">
            <input id="new-palace-full" class="fi" placeholder="完整标题（如：紫微天府在寅坐命宫）" style="flex:1">
            <button class="btn" onclick="addPalace()">➕ 添加宫位</button>
          </div>
        </div>
      </section>

      <!-- 宫位编辑（含天干） -->
      <section class="sec" id="sec-palace" style="display:none">
        <h2 class="sec-title" id="pal-edit-title">编辑宫位</h2>
        <div class="form-card">
          <div class="fg-row">
            <div class="fg"><label>宫位名称</label><input id="pe-name" class="fi"></div>
            <div class="fg"><label>完整标题</label><input id="pe-full" class="fi"></div>
          </div>
          <div class="fg"><label>宫位描述</label><textarea id="pe-desc" class="ft" rows="3"></textarea></div>
          <div class="btn-row">
            <button class="btn-save" onclick="savePalInfo()">保存宫位信息</button>
            <button class="btn-del" onclick="deletePal()">🗑️ 删除此宫位</button>
          </div>
        </div>

        <div class="form-card">
          <h3>十天干内容编辑</h3>
          <div class="stem-tabs" id="stem-tabs"></div>
          <div id="stem-editor"></div>
          <button class="btn-save" onclick="saveStem()" style="margin-top:16px">保存当前天干内容</button>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="js/admin.js"></script>
</body>
</html>
